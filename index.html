<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocal Range Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Vocal Range Analyzer</h1>
      <p>Find out if you are a soprano, tenor, baritone, bass, and more</p>
      <p class="copyright">&copy; fskvll</p>
    </header>

    <main>
      <!-- IDLE -->
      <div id="phase-idle" class="phase active">
        <div class="card start-screen">
          <div class="mic-icon">🎤</div>
          <h2>Find your voice type</h2>
          <p>You will sing three short clips: your lowest note, your highest note, then whatever you feel like. Takes about 20 seconds.</p>
          <button id="start-btn" class="btn-primary">Start</button>
        </div>
      </div>

      <!-- RECORDING -->
      <div id="phase-recording" class="phase">
        <div class="card recording-screen">
          <div class="instruction" id="instruction-text"></div>

          <div class="note-display">
            <div class="current-note" id="current-note">-</div>
            <div class="current-freq" id="current-freq">- Hz</div>
          </div>

          <div class="visualizer">
            <canvas id="waveform" height="80"></canvas>
          </div>

          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>

          <div class="detected-note" id="detected-note-label"></div>
        </div>
      </div>

      <!-- RESULTS -->
      <div id="phase-results" class="phase">
        <div class="card results-screen">
          <p class="voice-label">You are a</p>
          <div class="voice-name" id="voice-name"></div>

          <div class="range-row">
            <span class="range-note" id="result-low">-</span>
            <span class="range-sep">to</span>
            <span class="range-note" id="result-high">-</span>
          </div>

          <p class="voice-desc" id="voice-desc"></p>

          <div class="diagram-wrap">
            <canvas id="range-diagram"></canvas>
          </div>

          <button id="restart-btn" class="btn-secondary">Try again</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
